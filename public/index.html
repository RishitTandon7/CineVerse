<!DOCTYPE html>
<html>
<head>
    <title>CineVerse - Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="home-container">
        <div class="hero-section"> 
            <h1>Welcome to CineVerse</h1>
            <p class="subtitle">Your virtual meeting space for seamless collaboration</p>
        </div>
        <div class="actions-container">
            <div class="join-meeting card">
                <h2>Join a Meeting</h2>
                <div class="input-group">
                    <input type="text" id="meeting-code" placeholder="Enter Meeting Code">
                    <button id="join-button" class="primary-btn">
                        <i class="fas fa-sign-in-alt"></i>
                        Join
                    </button>
                </div>
            </div>
            <div class="divider">
                <span>OR</span>
            </div>
            <div class="create-meeting card">
                <h2>Create a Meeting</h2>
                <button id="create-button" class="primary-btn">
                    <i class="fas fa-plus-circle"></i>
                    Create Meeting
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script> </body>
</html>
