<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Room</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <script>
        var socket = io();
        var room = new URLSearchParams(window.location.search).get("room") || "public";
        socket.emit("join", { room: room });

        socket.on("user_joined", function(data) {
            alert(data.message);
        });
    </script>
</head>
<body>
    <h1>Welcome to the <span id="roomType"></span></h1>
    <p>Waiting for others to join...</p>

    <script>
        document.getElementById("roomType").innerText = new URLSearchParams(window.location.search).get("mode") === "private" ? "Private Couple Mode" : "Public Watch Party";
    </script>
</body>
</html>
